services:
  postgres:
    image: postgres:15
    container_name: dems_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-dems_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-dems_password}
      POSTGRES_DB: ${DATABASE_NAME:-dems_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-dems_user} -d ${DATABASE_NAME:-dems_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dems_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_HOSTNAME: postgres
      DATABASE_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./evidences:/app/evidences

  frontend:
    build:
      context: ./dems_frontend
      dockerfile: Dockerfile
    container_name: dems_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data: